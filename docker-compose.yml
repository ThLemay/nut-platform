services:

  db:
    image: postgres:16-alpine
    container_name: nut_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - nut_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
      image: dpage/pgadmin4
      container_name: nut_pgadmin
      restart: unless-stopped
      environment:
        PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL is required}
        PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
      ports:
        - "5050:80"
      depends_on:
        - db

  api:
    build:
      context: ./backend
    container_name: nut_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  nut_db_data: